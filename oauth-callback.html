<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patterna — Google Sign-In</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0A0F1E;
      color: #F0F4FF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: center;
    }
    .card { max-width: 480px; }
    .brand { font-size: 36px; font-weight: 800; color: #F5C842; margin-bottom: 24px; }
    h1 { font-size: 22px; margin-bottom: 12px; }
    p { color: #8B9DC3; line-height: 1.6; margin-bottom: 16px; }
    .btn {
      display: inline-block;
      background: #4F8EF7;
      color: white;
      padding: 14px 28px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      margin-top: 16px;
    }
    .hint { font-size: 13px; color: #8B9DC3; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">Patterna ✦</div>
    <h1>Signing you in…</h1>
    <p id="status">Returning to Patterna…</p>
    <a id="open-btn" class="btn" href="#">Open app</a>
    <p class="hint">If the app doesn't open automatically, tap the button above. Make sure Patterna is installed on this device.</p>
  </div>

  <script>
    (function () {
      // Forward every query param from this callback URL into the deep link
      // so the app can complete the Appwrite OAuth session (userId, secret, etc.)
      var search = window.location.search || "";
      var query = search.startsWith("?") ? search.slice(1) : search;
      var deepLink = "patterna://oauth-callback" + (query ? "?" + query : "");

      document.getElementById("open-btn").href = deepLink;
      setTimeout(function () { window.location.href = deepLink; }, 300);
    })();
  </script>
</body>
</html>
